name: Build Linux Release

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel git curl wget file nodejs npm pnpm rust \
            gtk3 webkit2gtk-4.1 librsvg libappindicator-gtk3 \
            openssl pkg-config xdotool dbus-glib \
            fuse2 appstream gdk-pixbuf2

      - name: Fix gdk-pixbuf loaders for AppImage
        run: |
          # New gdk-pixbuf2 (2.44+) on Arch uses glycin and no longer installs
          # loaders into /usr/lib/gdk-pixbuf-2.0/2.10.0/loaders/.
          # linuxdeploy-plugin-gtk still expects this directory structure.
          # Create it and generate the loaders.cache file.
          GDK_BINARY_DIR=$(pkg-config --variable=gdk_pixbuf_binarydir gdk-pixbuf-2.0 2>/dev/null || echo "/usr/lib/gdk-pixbuf-2.0/2.10.0")
          GDK_CACHE_FILE=$(pkg-config --variable=gdk_pixbuf_cache_file gdk-pixbuf-2.0 2>/dev/null || echo "/usr/lib/gdk-pixbuf-2.0/2.10.0/loaders.cache")
          GDK_MODULE_DIR=$(pkg-config --variable=gdk_pixbuf_moduledir gdk-pixbuf-2.0 2>/dev/null || echo "/usr/lib/gdk-pixbuf-2.0/2.10.0/loaders")
          echo "gdk_pixbuf_binarydir: $GDK_BINARY_DIR"
          echo "gdk_pixbuf_cache_file: $GDK_CACHE_FILE"
          echo "gdk_pixbuf_moduledir: $GDK_MODULE_DIR"
          # Create the expected directory structure
          mkdir -p "$GDK_BINARY_DIR"
          mkdir -p "$GDK_MODULE_DIR"
          # Generate loaders.cache (will be empty/minimal if no loaders exist)
          gdk-pixbuf-query-loaders --update-cache 2>/dev/null || true
          # If the cache file still doesn't exist, create a minimal one
          if [ ! -f "$GDK_CACHE_FILE" ]; then
            echo "Creating minimal loaders.cache at $GDK_CACHE_FILE"
            gdk-pixbuf-query-loaders > "$GDK_CACHE_FILE" 2>/dev/null || touch "$GDK_CACHE_FILE"
          fi
          echo "=== Verification ==="
          ls -la "$GDK_BINARY_DIR"/
          ls -la "$GDK_MODULE_DIR"/ 2>/dev/null || echo "(empty loaders dir - expected for gdk-pixbuf 2.44+)"
          cat "$GDK_CACHE_FILE" 2>/dev/null | head -5 || echo "cache file missing"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install frontend dependencies
        run: pnpm install

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build Tauri app
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
          NO_STRIP: "true"
        run: |
          pnpm tauri build --bundles deb,appimage --verbose

      - name: Upload deb
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: WeGame-Launcher-deb
          path: src-tauri/target/release/bundle/deb/*.deb

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: WeGame-Launcher-AppImage
          path: src-tauri/target/release/bundle/appimage/*.AppImage
