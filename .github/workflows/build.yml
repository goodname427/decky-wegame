name: Build Linux Release

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel git curl wget file nodejs npm pnpm rust \
            gtk3 webkit2gtk-4.1 librsvg libappindicator-gtk3 \
            openssl pkg-config xdotool dbus-glib \
            fuse2 appstream gdk-pixbuf2

      - name: Fix gdk-pixbuf loaders for AppImage
        run: |
          # Debug: find where gdk-pixbuf loaders are actually installed
          echo "=== Searching for gdk-pixbuf loaders ==="
          find / -path "*/gdk-pixbuf-2.0/*/loaders" -type d 2>/dev/null || true
          find / -name "libpixbufloader-png.so" 2>/dev/null || true
          echo "=== pkg-config info ==="
          pkg-config --variable=gdk_pixbuf_moduledir gdk-pixbuf-2.0 2>/dev/null || echo "pkg-config failed"
          pkg-config --variable=gdk_pixbuf_cache_file gdk-pixbuf-2.0 2>/dev/null || echo "no cache file var"
          echo "=== pacman files for gdk-pixbuf2 ==="
          pacman -Ql gdk-pixbuf2 | grep -E "(loaders|\.so)" | head -20
          echo "=== Checking expected path ==="
          ls -la /usr/lib/gdk-pixbuf-2.0/ 2>/dev/null || echo "/usr/lib/gdk-pixbuf-2.0/ does not exist"
          # Get the actual module dir from pkg-config
          ACTUAL_DIR=$(pkg-config --variable=gdk_pixbuf_moduledir gdk-pixbuf-2.0 2>/dev/null)
          EXPECTED_DIR="/usr/lib/gdk-pixbuf-2.0/2.10.0/loaders"
          if [ -n "$ACTUAL_DIR" ] && [ "$ACTUAL_DIR" != "$EXPECTED_DIR" ]; then
            echo "Actual dir ($ACTUAL_DIR) differs from expected ($EXPECTED_DIR), creating symlink"
            mkdir -p "$(dirname "$EXPECTED_DIR")"
            ln -sf "$(dirname "$ACTUAL_DIR")" "/usr/lib/gdk-pixbuf-2.0/2.10.0" || true
          fi
          # Ensure loaders cache is up to date
          gdk-pixbuf-query-loaders --update-cache || true
          echo "=== Final check ==="
          ls -la /usr/lib/gdk-pixbuf-2.0/2.10.0/ 2>/dev/null || echo "STILL NOT FOUND"
          ls -la /usr/lib/gdk-pixbuf-2.0/2.10.0/loaders/ 2>/dev/null | head -5 || echo "loaders dir not found"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install frontend dependencies
        run: pnpm install

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build Tauri app
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
          NO_STRIP: "true"
        run: |
          pnpm tauri build --bundles deb,appimage --verbose

      - name: Upload deb
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: WeGame-Launcher-deb
          path: src-tauri/target/release/bundle/deb/*.deb

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: WeGame-Launcher-AppImage
          path: src-tauri/target/release/bundle/appimage/*.AppImage
