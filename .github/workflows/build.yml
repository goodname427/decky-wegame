name: Build Linux Release

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel git curl wget file nodejs npm pnpm rust \
            gtk3 webkit2gtk-4.1 librsvg libappindicator-gtk3 \
            openssl pkg-config xdotool dbus-glib \
            fuse2 appstream gdk-pixbuf2

      - name: Fix gdk-pixbuf loaders for AppImage
        run: |
          # Ensure gdk-pixbuf loaders directory exists and cache is generated
          GDK_PIXBUF_DIR=$(pkg-config --variable=gdk_pixbuf_moduledir gdk-pixbuf-2.0 2>/dev/null || echo "/usr/lib/gdk-pixbuf-2.0/2.10.0/loaders")
          GDK_PIXBUF_BASE=$(dirname "$GDK_PIXBUF_DIR")
          echo "gdk-pixbuf module dir: $GDK_PIXBUF_DIR"
          echo "gdk-pixbuf base dir: $GDK_PIXBUF_BASE"
          ls -la "$GDK_PIXBUF_BASE" 2>/dev/null || echo "Base dir does not exist"
          ls -la "$GDK_PIXBUF_DIR" 2>/dev/null || echo "Module dir does not exist"
          # Create the expected directory structure if it doesn't exist
          mkdir -p /usr/lib/gdk-pixbuf-2.0/2.10.0/loaders
          # Update the loaders cache
          gdk-pixbuf-query-loaders --update-cache || true
          ls -la /usr/lib/gdk-pixbuf-2.0/2.10.0/

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install frontend dependencies
        run: pnpm install

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build Tauri app
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
          NO_STRIP: "true"
        run: |
          pnpm tauri build --bundles deb,appimage --verbose

      - name: Upload deb
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: WeGame-Launcher-deb
          path: src-tauri/target/release/bundle/deb/*.deb

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: WeGame-Launcher-AppImage
          path: src-tauri/target/release/bundle/appimage/*.AppImage
